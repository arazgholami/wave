<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<title>📻 Wave</title>
<style>
:root {
	font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
	font-size: 16px;
	color: #000;
	background: #fff;
	--safe-bottom: env(safe-area-inset-bottom, 0px);
	--player-height: 190px;
}

* {
	box-sizing: border-box;
}

html,
body {
	width: 100%;
	height: 100%;
	margin: 0;
	padding: 0;
	background: #fff;
	color: #000;
}

body {
	min-height: 100dvh;
	overflow: hidden;
}

a {
	color: #000;
	text-decoration: none;
}

button {
	font: inherit;
	background: #000;
	color: #fff;
	border: 1px solid #000;
	border-radius: 0;
	padding: 0.75rem 0.85rem;
	cursor: pointer;
	line-height: 1;
	min-height: 44px;
}

button:disabled {
	opacity: 0.45;
	cursor: not-allowed;
}

button.secondary {
	background: #fff;
	color: #000;
}

.app {
	width: 100%;
	max-width: 900px;
	height: 100dvh;
	margin: 0 auto;
	display: grid;
	grid-template-rows: auto auto 1fr auto;
	background: #fff;
}

header {
	padding: 0.75rem 0.85rem 0.45rem;
	border-bottom: 1px solid #000;
}

h1,
p {
	margin: 0;
}

h1 {
	font-size: 1.25rem;
	line-height: 1.15;
}

header p {
	font-size: 0.8rem;
	line-height: 1.35;
	margin-top: 0.25rem;
}

.country-tabs {
	border-bottom: 1px solid #000;
	overflow-x: auto;
	overflow-y: hidden;
	-webkit-overflow-scrolling: touch;
	scrollbar-width: none;
	background: #fff;
}

.country-tabs::-webkit-scrollbar {
	display: none;
}

#countries {
	list-style: none;
	margin: 0;
	padding: 0.5rem 0.65rem;
	display: flex;
	gap: 0.45rem;
	min-width: max-content;
}

#countries a {
	display: block;
	padding: 0.55rem 0.7rem;
	border: 1px solid #000;
	white-space: nowrap;
	font-size: 0.86rem;
	line-height: 1;
}

#countries a.selected {
	background: #000;
	color: #fff;
}

.station-wrap {
	min-height: 0;
	overflow-y: auto;
	-webkit-overflow-scrolling: touch;
	padding: 0.65rem 0.75rem calc(var(--player-height) + 0.75rem);
}

.section-title {
	font-size: 0.78rem;
	font-weight: 700;
	text-transform: uppercase;
	letter-spacing: 0.02em;
	margin: 0 0 0.5rem;
}

#stations {
	list-style: none;
	margin: 0;
	padding: 0;
}

#stations li + li {
	margin-top: 0.45rem;
}

.station-link {
	display: block;
	border: 1px solid #000;
	padding: 0.7rem;
	min-height: 56px;
}

.station-link.selected {
	background: #000;
	color: #fff;
}

.station-name {
	display: block;
	font-size: 1rem;
	line-height: 1.2;
	font-weight: 700;
}

.metadata {
	display: block;
	font-size: 0.74rem;
	line-height: 1.25;
	margin-top: 0.25rem;
	color: inherit;
	opacity: 0.7;
}

#stationsMessage {
	font-size: 0.9rem;
	line-height: 1.4;
	padding: 1rem 0;
}

.player-shell {
	position: sticky;
	bottom: 0;
	z-index: 10;
	background: #fff;
	border-top: 1px solid #000;
	padding: 0.65rem 0.75rem calc(0.65rem + var(--safe-bottom));
	min-height: var(--player-height);
}

#player {
	display: grid;
	gap: 0.55rem;
}

.now-playing {
	min-width: 0;
}

.player-title-row {
	display: flex;
	align-items: baseline;
	justify-content: space-between;
	gap: 0.75rem;
}

#playerTitle {
	font-size: 1rem;
	font-weight: 700;
	line-height: 1.2;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}

#playerQuality {
	font-size: 0.72rem;
	white-space: nowrap;
	opacity: 0.7;
}

#playerDescription {
	font-size: 0.76rem;
	line-height: 1.35;
	margin-top: 0.35rem;
	display: -webkit-box;
	-webkit-line-clamp: 3;
	-webkit-box-orient: vertical;
	overflow: hidden;
}

.player-actions {
	display: grid;
	grid-template-columns: 1fr 1.25fr 1fr;
	gap: 0.45rem;
}

.status-line {
	font-size: 0.72rem;
	line-height: 1.25;
	min-height: 1em;
	opacity: 0.75;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}

.sr-only {
	position: absolute;
	width: 1px;
	height: 1px;
	padding: 0;
	margin: -1px;
	overflow: hidden;
	clip: rect(0, 0, 0, 0);
	white-space: nowrap;
	border: 0;
}

@media screen and (min-width: 650px) {
	:root {
		--player-height: 175px;
	}

	.app {
		border-left: 1px solid #000;
		border-right: 1px solid #000;
	}

	header {
		padding-left: 1rem;
		padding-right: 1rem;
	}

	.station-wrap {
		padding-left: 1rem;
		padding-right: 1rem;
	}

	.player-shell {
		padding-left: 1rem;
		padding-right: 1rem;
	}
}
</style>
</head>
<body>
<div class="app">
	<header>
		<h1>📻 Wave</h1>
		<p>Easy way to listen to good radios</p>
	</header>

	<nav class="country-tabs" aria-label="Countries">
		<ul id="countries"></ul>
	</nav>

	<main class="station-wrap">
		<h2 class="section-title">Stations</h2>
		<ul id="stations"></ul>
		<p id="stationsMessage">Select a country</p>
	</main>

	<section class="player-shell" aria-label="Player">
		<div id="player">
			<div class="now-playing">
				<div class="player-title-row">
					<div id="playerTitle">Nothing selected</div>
					<div id="playerQuality"></div>
				</div>
				<p id="playerDescription">Choose a country, then choose a station.</p>
			</div>

			<div class="player-actions">
				<button id="prevButton" type="button" class="secondary" disabled>Prev</button>
				<button id="playButton" type="button" disabled>Play</button>
				<button id="nextButton" type="button" class="secondary" disabled>Next</button>
			</div>

			<div id="playerStatus" class="status-line" aria-live="polite"></div>
		</div>
	</section>
</div>

<audio id="audioPlayer" controls style="display:none"></audio>
<script src="./hls.js"></script>
<script src="./stations.js"></script>
<script>
const audio = document.getElementById('audioPlayer');
const countriesList = document.getElementById('countries');
const stationsList = document.getElementById('stations');
const stationsMessage = document.getElementById('stationsMessage');
const playerTitle = document.getElementById('playerTitle');
const playerDescription = document.getElementById('playerDescription');
const playerQuality = document.getElementById('playerQuality');
const playerStatus = document.getElementById('playerStatus');
const prevButton = document.getElementById('prevButton');
const playButton = document.getElementById('playButton');
const nextButton = document.getElementById('nextButton');

const countries = [...new Set(stations.map(station => station.country))].sort();

let currentCountry = null;
let currentStations = [];
let currentStationIndex = -1;
let currentUrl = null;
let currentHls = null;
let isLoading = false;

function renderCountries() {
	countriesList.innerHTML = '';

	countries.forEach(country => {
		const li = document.createElement('li');
		const link = document.createElement('a');
		link.href = '#';
		link.textContent = country;
		link.setAttribute('role', 'tab');
		link.setAttribute('aria-selected', 'false');
		link.addEventListener('click', event => {
			event.preventDefault();
			selectCountry(country);
		});

		li.appendChild(link);
		countriesList.appendChild(li);
	});
}

function selectCountry(country) {
	currentCountry = country;
	currentStations = stations.filter(station => station.country === country);
	currentStationIndex = -1;

	highlightCountry(country);
	renderStations(currentStations);
	resetPlayerSelection('Choose a station.');
}

function highlightCountry(country) {
	document.querySelectorAll('#countries a').forEach(link => {
		const isSelected = link.textContent === country;
		link.classList.toggle('selected', isSelected);
		link.setAttribute('aria-selected', isSelected ? 'true' : 'false');

		if (isSelected) {
			link.scrollIntoView({ inline: 'nearest', block: 'nearest' });
		}
	});
}

function renderStations(list) {
	stationsList.innerHTML = '';
	stationsMessage.style.display = list.length ? 'none' : 'block';

	list.forEach((station, index) => {
		const li = document.createElement('li');
		const link = document.createElement('a');
		const name = document.createElement('span');
		const meta = document.createElement('span');

		link.href = '#';
		link.className = 'station-link';
		link.dataset.index = String(index);

		name.className = 'station-name';
		name.textContent = station.name;

		meta.className = 'metadata';
		meta.textContent = station.country + ' · ' + station.quality;

		link.appendChild(name);
		link.appendChild(meta);
		link.addEventListener('click', event => {
			event.preventDefault();
			selectStation(index, false);
		});

		li.appendChild(link);
		stationsList.appendChild(li);
	});
}

function selectStation(index, autoplay) {
	if (!currentStations[index]) return;

	const wasPlaying = !!currentUrl && !audio.paused;
	const station = currentStations[index];
	currentStationIndex = index;

	highlightStation(index);
	setPlayerStation(station);
	setControlsEnabled(true);
	setStatus('Ready.');

	if (autoplay || wasPlaying) {
		playStation(station);
	}
}

function highlightStation(index) {
	document.querySelectorAll('#stations .station-link').forEach(link => {
		const isSelected = Number(link.dataset.index) === index;
		link.classList.toggle('selected', isSelected);
		if (isSelected) link.scrollIntoView({ block: 'nearest' });
	});
}

function setPlayerStation(station) {
	playerTitle.textContent = station.name;
	playerDescription.textContent = station.description;
	playerQuality.textContent = station.quality;
	playButton.textContent = currentUrl === station.url && !audio.paused ? 'Stop' : 'Play';
	document.title = station.name + ' · Wave';
}

function resetPlayerSelection(message) {
	stopAudio();
	playerTitle.textContent = 'Nothing selected';
	playerDescription.textContent = message || 'Choose a country, then choose a station.';
	playerQuality.textContent = '';
	playButton.textContent = 'Play';
	setControlsEnabled(false);
	setStatus('');
	document.title = 'Wave';
}

function setControlsEnabled(enabled) {
	prevButton.disabled = !enabled;
	playButton.disabled = !enabled;
	nextButton.disabled = !enabled;
}

function setStatus(message) {
	playerStatus.textContent = message || '';
}

function destroyHls() {
	if (currentHls) {
		currentHls.destroy();
		currentHls = null;
	}

	if (audio.hls) {
		audio.hls.destroy();
		audio.hls = null;
	}
}

function stopAudio() {
	isLoading = false;
	destroyHls();
	audio.pause();
	audio.removeAttribute('src');
	audio.load();
	currentUrl = null;
	playButton.textContent = 'Play';
}

function togglePlay() {
	const station = currentStations[currentStationIndex];
	if (!station || isLoading) return;

	if (currentUrl === station.url && !audio.paused) {
		stopAudio();
		setStatus('Stopped.');
		return;
	}

	playStation(station);
}

function playStation(station) {
	if (!station) return;

	stopAudio();
	isLoading = true;
	currentUrl = station.url;
	playButton.textContent = 'Loading';
	setStatus('Loading stream...');
	updateMediaSession(station);

	const onPlaySuccess = () => {
		isLoading = false;
		playButton.textContent = 'Stop';
		setStatus('Playing.');
		document.title = station.name + ' · Wave';
	};

	const onPlayError = error => {
		isLoading = false;
		stopAudio();
		setStatus('Playback failed. Try another station.');
		alert('Playback failed: ' + (error && error.message ? error.message : error));
	};

	if (station.url.includes('.m3u8') && window.Hls && Hls.isSupported()) {
		currentHls = new Hls();
		audio.hls = currentHls;
		currentHls.loadSource(station.url);
		currentHls.attachMedia(audio);
		currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
			audio.play().then(onPlaySuccess).catch(onPlayError);
		});
		currentHls.on(Hls.Events.ERROR, (event, data) => {
			if (data && data.fatal) {
				onPlayError(data.details || 'HLS error');
			}
		});
		return;
	}

	if (station.url.includes('.m3u8') && audio.canPlayType('application/vnd.apple.mpegurl')) {
		audio.src = station.url;
		audio.play().then(onPlaySuccess).catch(onPlayError);
		return;
	}

	audio.src = station.url;
	audio.play().then(onPlaySuccess).catch(onPlayError);
}

function playNextStation() {
	moveStation(1);
}

function playPreviousStation() {
	moveStation(-1);
}

function moveStation(direction) {
	if (!countries.length) return;

	let countryIndex = currentCountry ? countries.indexOf(currentCountry) : 0;
	let nextIndex = currentStationIndex + direction;
	let nextCountry = currentCountry;
	let nextStations = currentStations;

	if (!nextStations.length) {
		nextCountry = countries[countryIndex] || countries[0];
		nextStations = stations.filter(station => station.country === nextCountry);
		nextIndex = direction > 0 ? 0 : nextStations.length - 1;
	}

	if (nextIndex >= nextStations.length) {
		countryIndex = (countryIndex + 1) % countries.length;
		nextCountry = countries[countryIndex];
		nextStations = stations.filter(station => station.country === nextCountry);
		nextIndex = 0;
	}

	if (nextIndex < 0) {
		countryIndex = (countryIndex - 1 + countries.length) % countries.length;
		nextCountry = countries[countryIndex];
		nextStations = stations.filter(station => station.country === nextCountry);
		nextIndex = nextStations.length - 1;
	}

	currentCountry = nextCountry;
	currentStations = nextStations;
	highlightCountry(nextCountry);
	renderStations(nextStations);
	selectStation(nextIndex, true);
}

function updateMediaSession(station) {
	if ('mediaSession' in navigator) {
		navigator.mediaSession.metadata = new MediaMetadata({
			title: station.name,
			artist: station.country,
			album: 'Wave',
			artwork: [
				{
					src: 'icon.svg',
					sizes: '512x512',
					type: 'image/svg+xml'
				}
			]
		});

		navigator.mediaSession.setActionHandler('nexttrack', playNextStation);
		navigator.mediaSession.setActionHandler('previoustrack', playPreviousStation);
		navigator.mediaSession.setActionHandler('play', () => {
			const station = currentStations[currentStationIndex];
			if (station) playStation(station);
		});
		navigator.mediaSession.setActionHandler('pause', () => {
			stopAudio();
			setStatus('Stopped.');
		});
	}
}

playButton.addEventListener('click', togglePlay);
prevButton.addEventListener('click', playPreviousStation);
nextButton.addEventListener('click', playNextStation);

audio.addEventListener('ended', () => {
	playButton.textContent = 'Play';
	currentUrl = null;
	setStatus('Stream ended.');
});

audio.addEventListener('error', () => {
	if (currentUrl) {
		stopAudio();
		setStatus('Stream error. Try another station.');
	}
});

renderCountries();

if (countries.length) {
	selectCountry(countries[0]);
}

if ('serviceWorker' in navigator) {
	window.addEventListener('load', () => {
		navigator.serviceWorker.register('sw.js').catch(() => {
			// Ignore registration failure for browsers where registration isn't available.
		});
	});
}
</script>
</body>
</html>
